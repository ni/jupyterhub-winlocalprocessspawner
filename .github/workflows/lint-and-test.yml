name: Lint and Test

on:
  push:
    branches:
      - "master"
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Install ni-python-styleguide
        run: python -m pip install ni-python-styleguide

      - name: Run ni-python-styleguide
        run: python -m ni-python-styleguide lint winlocalprocessspawner
        
